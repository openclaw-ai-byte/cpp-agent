# Configuration
api:
  key: "${OPENAI_API_KEY}"
  base: "https://api.openai.com/v1"
  model: "gpt-4"

agent:
  system_prompt: |
    You are a helpful AI assistant with access to various tools.
    Use them wisely to help the user accomplish their tasks.
  max_tokens: 4096
  temperature: 0.7

tools:
  enabled: true
  require_confirmation:
    - execute_command
    - write_file

server:
  host: "0.0.0.0"
  port: 8000
